<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Degrande Colors v0.6.7</title>
    <meta name="degrande-colors-version" content="0.6.7">
    <style>
      :root {
        color-scheme: light;
        --ctl-bg: rgba(248, 250, 252, 0.96);
        --ctl-bg-muted: rgba(255, 255, 255, 0.78);
        --ctl-border: rgba(148, 163, 184, 0.34);
        --ctl-text: #0f172a;
        --ctl-text-muted: #475569;
        --ctl-accent: #0f766e;
        --ctl-accent-strong: #0b5f59;
        --ctl-code-bg: #f8fafc;
        --ctl-shadow: 0 30px 80px rgba(15, 23, 42, 0.18);
      }

      body.theme-dark {
        color-scheme: dark;
        --ctl-bg: rgba(15, 23, 42, 0.96);
        --ctl-bg-muted: rgba(15, 23, 42, 0.72);
        --ctl-border: rgba(148, 163, 184, 0.22);
        --ctl-text: #e2e8f0;
        --ctl-text-muted: #94a3b8;
        --ctl-accent: #34d399;
        --ctl-accent-strong: #10b981;
        --ctl-code-bg: #020617;
        --ctl-shadow: 0 32px 90px rgba(2, 6, 23, 0.55);
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        width: 100%;
      }

      body.degrande-panel-host {
        min-height: 100vh;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        font-family: Aptos, "Segoe UI", sans-serif;
        background: transparent;
        color: var(--ctl-text);
      }

      #app {
        display: none;
      }

      body.degrande-panel-host #app {
        position: fixed;
        inset: 0;
        height: 100vh;
        width: 100vw;
        display: block;
        overflow: hidden;
        pointer-events: none;
      }

      .ctl-shell {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: start center;
        height: 100vh;
        width: 100vw;
        padding: 6vh min(5vw, 40px) 10vh;
        box-sizing: border-box;
        pointer-events: none;
      }

      .ctl-backdrop {
        position: absolute;
        inset: 0;
        background: transparent;
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        pointer-events: auto;
      }

      .ctl-window {
        position: relative;
        box-sizing: border-box;
        width: min(1000px, 100%);
        max-width: 1000px;
        height: 100%;
        max-height: 100%;
        margin: 0;
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr);
        background: var(--ctl-bg);
        border: 2px solid var(--ctl-border);
        border-radius: 0;
        overflow: hidden;
        box-shadow: var(--ctl-shadow);
        pointer-events: auto;
      }

      .ctl-header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: end;
        gap: 18px;
        padding: 18px 22px 14px;
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.16), transparent 55%);
      }

      .ctl-eyebrow {
        margin: 0 0 6px;
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ctl-accent);
        font-weight: 700;
      }

      .ctl-header h1 {
        margin: 0;
        font-size: 26px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .ctl-title-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
      }

      .ctl-version-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 4px 8px;
        border: 1px solid var(--ctl-border);
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ctl-accent);
        background: rgba(255, 255, 255, 0.42);
      }

      .theme-dark .ctl-version-badge {
        background: rgba(15, 23, 42, 0.62);
      }

      .ctl-subtitle {
        margin: 6px 0 0;
        font-size: 13px;
        line-height: 1.45;
        color: var(--ctl-text-muted);
      }

      .ctl-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 10px 22px;
        border-top: 1px solid var(--ctl-border);
        border-bottom: 1px solid var(--ctl-border);
        background: var(--ctl-bg-muted);
      }

      .ctl-main {
        min-height: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        overflow: hidden;
      }

      .ctl-section {
        border: 1px solid var(--ctl-border);
        border-radius: 18px;
        padding: 14px;
        background: rgba(255, 255, 255, 0.4);
      }

      .theme-dark .ctl-section {
        background: rgba(15, 23, 42, 0.5);
      }

      .ctl-section + .ctl-section {
        margin-top: 14px;
      }

      .ctl-section-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: start;
      }

      .ctl-section-head h2 {
        margin: 0;
        font-size: 13px;
        line-height: 1.2;
        letter-spacing: 0.02em;
      }

      .ctl-pane-intro-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .ctl-section-head p {
        margin: 3px 0 0;
        font-size: 11px;
        line-height: 1.35;
        color: var(--ctl-text-muted);
      }

      .ctl-control {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .ctl-control-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .ctl-control-label {
        font-size: 12px;
        font-weight: 600;
      }

      .ctl-control-value {
        font-size: 12px;
        color: var(--ctl-accent);
        letter-spacing: 0.02em;
      }

      .ctl-range {
        width: 100%;
        margin: 0;
      }

      .ctl-control-highlight-range {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 14px;
      }

      .ctl-control-highlight-range > .ctl-control-header {
        grid-column: 1 / -1;
        margin-bottom: 2px;
      }

      .ctl-control-highlight-boundary {
        margin-top: 0;
      }

      .ctl-toolbar-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .ctl-button {
        border: 1px solid transparent;
        border-radius: 12px;
        padding: 8px 12px;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.14s ease, opacity 0.14s ease, background 0.14s ease;
      }

      .ctl-button:hover {
        transform: translateY(-1px);
      }

      .ctl-button:active {
        transform: translateY(0);
      }

      .ctl-button:disabled,
      .ctl-button:disabled:hover,
      .ctl-button:disabled:active {
        opacity: 0.58;
        cursor: default;
        transform: none;
      }

      .ctl-button.is-busy {
        position: relative;
        overflow: hidden;
        background-image: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.16) 35%, rgba(255, 255, 255, 0.3) 50%, rgba(255, 255, 255, 0.16) 65%, transparent 100%);
        background-size: 220% 100%;
        animation: ctl-button-busy-sweep 1.05s linear infinite;
      }

      @keyframes ctl-button-busy-sweep {
        from {
          background-position: 200% 0;
        }

        to {
          background-position: -20% 0;
        }
      }

      .ctl-button-primary {
        background: var(--ctl-accent);
        color: #f8fafc;
      }

      .ctl-button-primary:hover {
        background: var(--ctl-accent-strong);
      }

      .ctl-button-secondary {
        background: transparent;
        color: var(--ctl-text);
        border-color: var(--ctl-border);
      }

      .ctl-button-small {
        padding: 6px 10px;
        font-size: 11px;
      }

      .ctl-appearance-toggle.is-active {
        border-color: rgba(34, 197, 94, 0.32);
        background: rgba(34, 197, 94, 0.08);
        color: var(--ctl-text);
      }

      .ctl-appearance-toggle.is-disabled {
        border-color: rgba(245, 158, 11, 0.32);
        background: rgba(245, 158, 11, 0.08);
        color: var(--ctl-text-muted);
      }

      .ctl-status {
        min-height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        font-size: 12px;
        color: var(--ctl-text-muted);
        text-align: right;
      }

      .ctl-status-text {
        min-width: 0;
      }

      .ctl-sync-revision {
        flex: 0 0 auto;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        color: var(--ctl-text-muted);
        text-transform: uppercase;
      }

      .ctl-sync-indicator {
        flex: 0 0 auto;
        width: 14px;
        height: 14px;
        border: none;
        border-radius: 999px;
        padding: 0;
        background: #f59e0b;
        box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.16);
        cursor: pointer;
        transition: transform 0.14s ease, box-shadow 0.14s ease, background-color 0.14s ease;
      }

      .ctl-sync-indicator:hover {
        transform: scale(1.08);
      }

      .ctl-sync-indicator:focus-visible {
        outline: 2px solid var(--ctl-accent);
        outline-offset: 2px;
      }

      .ctl-sync-indicator[data-sync-state="synced"] {
        background: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.16);
      }

      .ctl-sync-indicator[data-sync-state="pending"] {
        background: #f59e0b;
        box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.16);
      }

      .ctl-viewer {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        height: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .ctl-tabbar {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        padding: 0 22px;
        border-bottom: 1px solid var(--ctl-border);
        background: linear-gradient(180deg, rgba(15, 118, 110, 0.03), transparent 90%);
      }

      .ctl-tab {
        flex: 0 0 auto;
        border: 1px solid transparent;
        border-bottom: none;
        background: transparent;
        color: var(--ctl-text-muted);
        border-radius: 10px 10px 0 0;
        padding: 10px 14px 9px;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        top: 1px;
      }

      .ctl-tab:hover {
        color: var(--ctl-text);
        background: rgba(15, 118, 110, 0.05);
      }

      .ctl-tab.is-active {
        background: var(--ctl-bg);
        color: var(--ctl-accent);
        border-color: var(--ctl-border);
        box-shadow: inset 0 2px 0 rgba(15, 118, 110, 0.26);
      }

      .ctl-pane {
        min-height: 0;
        height: 100%;
        padding: 12px 22px 18px;
        box-sizing: border-box;
      }

      .ctl-pane[hidden] {
        display: none;
      }

      .ctl-pane-preview {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 14px;
        overflow: hidden;
      }

      .ctl-pane-tags {
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        overflow: hidden;
      }

      .ctl-pane-stack {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 14px;
        min-height: 0;
        height: 100%;
        overflow: hidden;
      }

      .ctl-preview-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        min-height: 0;
        align-items: start;
      }

      .ctl-css-diagnostics {
        display: grid;
        gap: 12px;
      }

      .ctl-css-diagnostics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
      }

      .ctl-css-stat-card,
      .ctl-appearance-toggle-card {
        display: grid;
        gap: 6px;
        padding: 10px 12px;
        border: 1px solid var(--ctl-border);
        border-radius: 14px;
        background: var(--ctl-bg-muted);
      }

      .ctl-css-stat-card strong,
      .ctl-appearance-toggle-card strong {
        font-size: 12px;
      }

      .ctl-css-stat-card span,
      .ctl-appearance-toggle-card span {
        font-size: 11px;
        color: var(--ctl-text-muted);
      }

      .ctl-appearance-toggle-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }

      .ctl-preview-card {
        border: 1px solid var(--ctl-border);
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(15, 118, 110, 0.04), transparent 20%), var(--ctl-bg-muted);
        padding: 14px;
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .ctl-preview-card-body {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        align-items: start;
      }

      .ctl-preview-card-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .ctl-preview-card-head.is-disabled strong,
      .ctl-preview-card-head.is-disabled span {
        opacity: 0.7;
      }

      .ctl-preview-card-head-copy {
        display: grid;
        gap: 4px;
      }

      .ctl-preview-card-head strong {
        font-size: 13px;
        line-height: 1.2;
      }

      .ctl-preview-card-head span {
        font-size: 11px;
        color: var(--ctl-text-muted);
      }

      .ctl-preview-stage {
        min-height: 104px;
        border-radius: 16px;
        border: 1px dashed var(--ctl-border);
        background: rgba(148, 163, 184, 0.06);
        padding: 12px;
        box-sizing: border-box;
        order: 0;
      }

      .ctl-preview-stage-tags {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .ctl-preview-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        white-space: nowrap;
        font-weight: 700;
        line-height: 1;
      }

      .ctl-preview-block,
      .ctl-preview-title-card,
      .ctl-preview-highlight,
      .ctl-preview-quote,
      .ctl-preview-background {
        min-height: 104px;
        box-sizing: border-box;
        order: 0;
      }

      .ctl-preview-block,
      .ctl-preview-title-card,
      .ctl-preview-highlight,
      .ctl-preview-background {
        border: 1px solid var(--ctl-border);
        border-radius: 18px;
        padding: 14px;
      }

      .ctl-preview-meta {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ctl-accent);
      }

      .ctl-preview-heading,
      .ctl-preview-title {
        margin: 8px 0 0;
        font-size: 20px;
        line-height: 1.1;
        letter-spacing: -0.04em;
      }

      .ctl-preview-block p,
      .ctl-preview-highlight-line,
      .ctl-preview-background,
      .ctl-preview-quote {
        margin: 8px 0 0;
        font-size: 12px;
        line-height: 1.5;
      }

      .ctl-preview-highlight-line mark {
        color: inherit;
        -webkit-text-fill-color: currentColor;
        text-decoration: none;
        background-color: transparent;
        border-radius: 0.35em;
        padding: 0 0.18em;
        -webkit-box-decoration-break: clone;
        box-decoration-break: clone;

        background-image: var(--ctl-preview-highlight-gradient, none);
        background-size: var(--ctl-preview-highlight-size, 100% 100%);
        background-position: var(--ctl-preview-highlight-position, 0% 0%);
        background-repeat: no-repeat;
      }

      .ctl-section-inline {
        align-content: start;
      }

      .ctl-preview-card .ctl-section-inline {
        border: 0;
        border-radius: 0;
        background: transparent;
        padding: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px 12px;
      }

      .ctl-preview-card .ctl-section-inline.ctl-gradient-editor {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .ctl-preset-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        align-items: start;
      }

      .ctl-preset-column {
        display: grid;
        gap: 6px;
        align-content: start;
        min-width: 0;
      }

      .ctl-preview-card .ctl-section-inline .ctl-section-head {
        grid-column: 1 / -1;
        padding-bottom: 2px;
      }

      .ctl-preview-card .ctl-section-inline .ctl-control {
        margin-top: 0;
      }

      .ctl-gradient-editor {
        border: 0;
        border-radius: 0;
        background: transparent;
        padding: 0;
        gap: 10px;
        align-items: start;
      }

      .ctl-gradient-column {
        min-width: 0;
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .ctl-gradient-column-main {
        grid-template-columns: 1fr;
      }

      .ctl-gradient-column-side {
        grid-template-columns: 1fr;
      }

      .ctl-gradient-canvas {
        display: grid;
        gap: 8px;
      }

      .ctl-gradient-preview-surface {
        display: grid;
        gap: 14px;
        align-content: start;
        overflow: hidden;
      }

      .ctl-gradient-strip {
        position: relative;
        height: 44px;
        border-radius: 14px;
        border: 1px solid var(--ctl-border);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(148, 163, 184, 0.12));
        cursor: pointer;
        touch-action: none;
        margin-top: auto;
      }

      .theme-dark .ctl-gradient-strip {
        background: linear-gradient(180deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.65));
      }

      .ctl-gradient-strip::before,
      .ctl-gradient-strip::after {
        content: "";
        position: absolute;
        left: 8px;
        right: 8px;
        height: 1px;
        background: rgba(148, 163, 184, 0.5);
        pointer-events: none;
      }

      .ctl-gradient-strip::before {
        top: 30%;
      }

      .ctl-gradient-strip::after {
        top: 70%;
      }

      .theme-dark .ctl-gradient-strip::before,
      .theme-dark .ctl-gradient-strip::after {
        background: rgba(148, 163, 184, 0.35);
      }

      .ctl-gradient-handle {
        position: absolute;
        top: 30%;
        width: 18px;
        height: 18px;
        padding: 0;
        border-radius: 999px;
        border: 2px solid rgba(255, 255, 255, 0.95);
        background: var(--ctl-stop-swatch, transparent);
        box-shadow: 0 8px 16px rgba(15, 23, 42, 0.16);
        transform: translateY(-50%);
        cursor: grab;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .ctl-gradient-handle.is-track-bottom {
        top: 70%;
      }

      .ctl-gradient-handle:active {
        cursor: grabbing;
      }

      .ctl-stop-picker {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .ctl-stop-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px 4px 4px;
        border: 1px solid var(--ctl-border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.55);
        color: var(--ctl-text);
        font: inherit;
        font-size: 11px;
        cursor: pointer;
        transition: border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      }

      .theme-dark .ctl-stop-chip {
        background: rgba(15, 23, 42, 0.55);
      }

      .ctl-stop-chip:hover {
        border-color: rgba(15, 118, 110, 0.4);
      }

      .ctl-stop-chip.is-active {
        border-color: rgba(15, 118, 110, 0.6);
        box-shadow: 0 0 0 2px rgba(15, 118, 110, 0.18);
        background: linear-gradient(180deg, rgba(15, 118, 110, 0.12), rgba(15, 118, 110, 0.04));
      }

      .ctl-stop-chip-swatch {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 1px solid rgba(148, 163, 184, 0.45);
        flex: none;
      }

      .ctl-stop-chip-label {
        font-weight: 700;
      }

      .ctl-stop-chip-position {
        color: var(--ctl-text-muted);
      }

      .ctl-gradient-handle.is-transparent {
        background-image: linear-gradient(45deg, rgba(148, 163, 184, 0.22) 25%, transparent 25%, transparent 50%, rgba(148, 163, 184, 0.22) 50%, rgba(148, 163, 184, 0.22) 75%, transparent 75%, transparent);
        background-size: 8px 8px;
        background-color: rgba(255, 255, 255, 0.75);
      }

      .ctl-gradient-handle.is-active {
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.18), 0 10px 18px rgba(15, 23, 42, 0.22);
      }

      .ctl-gradient-primary-controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        align-items: end;
      }

      .ctl-gradient-angle {
        margin-top: 0;
      }

      .ctl-gradient-primary-controls .ctl-control {
        margin-top: 0;
      }

      .ctl-gradient-inspector {
        border: 1px solid var(--ctl-border);
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.36);
        display: grid;
        gap: 8px;
        align-content: start;
      }

      .theme-dark .ctl-gradient-inspector {
        background: rgba(15, 23, 42, 0.45);
      }

      .ctl-gradient-inspector-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: center;
        font-size: 12px;
        color: var(--ctl-text-muted);
      }

      .ctl-gradient-inspector-head strong {
        color: var(--ctl-text);
      }

      .ctl-gradient-inspector-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 10px;
        align-items: end;
      }

      .ctl-gradient-group {
        display: grid;
        gap: 8px;
      }

      .ctl-gradient-group-label {
        font-size: 11px;

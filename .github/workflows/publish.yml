name: Publish Logseq Plugin

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create plugin archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}"
          mkdir -p dist
          cd logseq-db-degrande-colors
          zip -r "../dist/degrane-colors-${VERSION}.zip" \
            package.json \
            index.html \
            plugin.js \
            custom.css \
            icon.svg

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true